<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>මෝඩ පරීක්ෂණය 🤪</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a;
            --card: #12122a;
            --accent: #ff6b35;
            --accent2: #ffd166;
            --accent3: #06d6a0;
            --text: #e8e8f0;
            --text-dim: #8888aa;
            --wrong: #ef476f;
            --right: #06d6a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans Sinhala', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 209, 102, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(6, 214, 160, 0.05) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 16px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 0 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header .emoji-top {
            font-size: 64px;
            display: block;
            margin-bottom: 16px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.4;
        }

        .header p {
            color: var(--text-dim);
            font-size: 1rem;
            margin-top: 8px;
            font-weight: 300;
        }

        /* Progress bar */
        .progress-wrap {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            height: 8px;
            margin: 20px 0 30px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .progress-bar {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 0%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .progress-text {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        /* Email section */
        .email-section {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 32px 28px;
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease-out;
        }

        .email-section label {
            display: block;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--accent2);
        }

        .email-section input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--text);
            font-size: 1rem;
            font-family: 'Noto Sans Sinhala', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .email-section input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.15);
        }

        .email-section input::placeholder {
            color: var(--text-dim);
        }

        .email-error {
            color: var(--wrong);
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }

        /* Question card */
        .question-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 32px 28px;
            margin-bottom: 20px;
            animation: fadeInUp 0.5s ease-out;
            transition: all 0.3s;
        }

        .question-card.hidden {
            display: none;
        }

        .q-number {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #000;
            font-weight: 800;
            font-size: 0.8rem;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 14px;
        }

        .q-text {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 22px;
        }

        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 14px 20px;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            overflow: hidden;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s;
        }

        .option:hover {
            border-color: var(--accent);
            transform: translateX(6px);
            background: rgba(255, 107, 53, 0.06);
        }

        .option:hover::before {
            left: 100%;
        }

        .option.selected {
            border-color: var(--accent);
            background: rgba(255, 107, 53, 0.12);
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.15);
        }

        .option.correct {
            border-color: var(--right);
            background: rgba(6, 214, 160, 0.12);
        }

        .option.wrong {
            border-color: var(--wrong);
            background: rgba(239, 71, 111, 0.12);
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.5;
        }

        /* Buttons */
        .btn-next {
            display: none;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-family: 'Noto Sans Sinhala', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.3s;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            color: #fff;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.3);
        }

        .btn-start {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-family: 'Noto Sans Sinhala', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), #ff8c5a);
            color: #fff;
            margin-top: 16px;
            transition: all 0.3s;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.3);
        }

        .btn-start:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Results */
        .results {
            display: none;
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }

        .results-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 40px 28px;
            position: relative;
            overflow: hidden;
        }

        .results-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
        }

        .result-emoji {
            font-size: 80px;
            display: block;
            margin-bottom: 20px;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .score-display {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-label {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin: 8px 0 20px;
        }

        .result-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .result-desc {
            color: var(--text-dim);
            font-size: 1rem;
            line-height: 1.7;
            max-width: 480px;
            margin: 0 auto;
        }

        .meter-wrap {
            margin: 30px auto;
            max-width: 320px;
        }

        .meter-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .meter {
            height: 14px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 0%;
        }

        .btn-retry {
            display: inline-block;
            padding: 14px 40px;
            border: 2px solid var(--accent);
            border-radius: 14px;
            background: transparent;
            color: var(--accent);
            font-family: 'Noto Sans Sinhala', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 28px;
            transition: all 0.3s;
        }

        .btn-retry:hover {
            background: var(--accent);
            color: #fff;
            transform: translateY(-2px);
        }

        /* Feedback toast */
        .feedback {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(20px);
        }

        .feedback.show {
            transform: translateX(-50%) translateY(0);
        }

        .feedback.correct {
            background: rgba(6, 214, 160, 0.2);
            border: 1px solid var(--right);
            color: var(--right);
        }

        .feedback.incorrect {
            background: rgba(239, 71, 111, 0.2);
            border: 1px solid var(--wrong);
            color: var(--wrong);
        }

        /* Share button */
        .btn-share {
            display: inline-block;
            padding: 14px 40px;
            border: 2px solid var(--accent2);
            border-radius: 14px;
            background: transparent;
            color: var(--accent2);
            font-family: 'Noto Sans Sinhala', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            margin-left: 8px;
            transition: all 0.3s;
        }

        .btn-share:hover {
            background: var(--accent2);
            color: #000;
            transform: translateY(-2px);
        }

        /* Stats row */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 24px 0;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent2);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            z-index: 200;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.7rem; }
            .q-text { font-size: 1.1rem; }
            .score-display { font-size: 3rem; }
            .result-title { font-size: 1.3rem; }
            .stats-row { gap: 16px; }
            .stat-value { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <span class="emoji-top">🧠</span>
        <h1>ඔයා කොච්චර මෝඩද?</h1>
        <p>ප්‍රශ්න 15ට උත්තර දීලා බලන්න! 🔥</p>
    </div>

    <!-- Email Section -->
    <div class="email-section" id="emailSection">
        <label>📧 ඔයාගේ Email එක ලියන්න</label>
        <input type="email" id="emailInput" placeholder="example@email.com" autocomplete="email">
        <div class="email-error" id="emailError">කරුණාකර නිවැරදි email එකක් ලියන්න</div>
        <button class="btn-start" id="btnStart" disabled>පරීක්ෂණය පටන් ගන්න 🚀</button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText" style="display:none"></div>

    <!-- Questions Container -->
    <div id="quizContainer"></div>

    <!-- Results -->
    <div class="results" id="results">
        <div class="results-card">
            <span class="result-emoji" id="resultEmoji"></span>
            <div class="score-display" id="scoreDisplay"></div>
            <div class="score-label" id="scoreLabel"></div>
            <div class="result-title" id="resultTitle"></div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-value" id="statCorrect">0</div>
                    <div class="stat-label">✅ නිවැරදි</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statWrong">0</div>
                    <div class="stat-label">❌ වැරදි</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statTime">0s</div>
                    <div class="stat-label">⏱️ කාලය</div>
                </div>
            </div>
            <div class="meter-wrap">
                <div class="meter-label">
                    <span>🧠 බුද්ධිමත්</span>
                    <span>මෝඩ 🤪</span>
                </div>
                <div class="meter">
                    <div class="meter-fill" id="meterFill"></div>
                </div>
            </div>
            <div class="result-desc" id="resultDesc"></div>
            <div style="margin-top: 28px;">
                <button class="btn-retry" onclick="location.reload()">🔄 නැවත කරන්න</button>
                <button class="btn-share" onclick="shareResult()">📤 Share කරන්න</button>
            </div>
        </div>
    </div>
</div>

<!-- Feedback Toast -->
<div class="feedback" id="feedback"></div>

<script>
const questions = [
    {
        q: "මිනිහෙක් වැස්සේ ඇවිදගෙන ගියා. කුඩයක් නැහැ, තොප්පියක් නැහැ. ඒත් ඔළුවේ එක හිසකෙස් නූලක්වත් තෙමුණේ නැහැ. ඇයි?",
        options: ["ඉතා වේගයෙන් දිව්වා", "හිසකෙස් නැති තට්ටයෙක්", "ගෙදරට වැස්ස ඇවිත් නැහැ", "මැජික් කෙනෙක්"],
        correct: 1,
        foolish: [0, 2, 3],
        explanation: "ඔළුවේ හිසකෙස්ම නැත්නම් තෙමෙන්නේ නැහැනේ! 😂"
    },
    {
        q: "අවුරුද්දක මාස කීයක් දවස් 28ක් තියෙනවද?",
        options: ["1ක් විතරයි (පෙබරවාරි)", "2ක්", "මාස 12ම", "6ක්"],
        correct: 2,
        foolish: [0, 1, 3],
        explanation: "හැම මාසයකම අවම වශයෙන් දවස් 28ක් තියෙනවා! 🤯"
    },
    {
        q: "ඔයා තරඟයක දෙවැනි තැනේ ඉන්න කෙනාව පරදවනවා. ඔයා දැන් කීවැනි තැනේ?",
        options: ["පළවැනි තැනේ", "දෙවැනි තැනේ", "තුන්වැනි තැනේ", "අවසාන තැනේ"],
        correct: 1,
        foolish: [0, 2, 3],
        explanation: "දෙවැනි තැනේ කෙනාව පරදවනවා කියන්නේ ඔයා ඒ තැනට යනවා - දෙවැනි තැනට!"
    },
    {
        q: "විදුලි දුම්රියක් උතුරට යනවා. සුළඟ බටහිරට හමනවා. දුම යන්නේ කුමන දිශාවටද?",
        options: ["උතුරට", "බටහිරට", "නැගෙනහිරට", "දුම් නැහැ - විදුලි දුම්රියක්!"],
        correct: 3,

let currentQ = 0;
let score = 0;
let foolishScore = 0;
let userEmail = '';
let answered = false;
let startTime = null;

const emailInput = document.getElementById('emailInput');
const btnStart = document.getElementById('btnStart');
const emailError = document.getElementById('emailError');

emailInput.addEventListener('input', () => {
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value);
    btnStart.disabled = !valid;
    emailError.style.display = 'none';
});

emailInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !btnStart.disabled) {
        btnStart.click();
    }
});

btnStart.addEventListener('click', () => {
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value);
    if (!valid) {
        emailError.style.display = 'block';
        emailInput.parentElement.classList.add('shake');
        setTimeout(() => emailInput.parentElement.classList.remove('shake'), 500);
        return;
    }
    userEmail = emailInput.value;
    startTime = Date.now();
    document.getElementById('emailSection').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('progressText').style.display = 'block';
    showQuestion();
});

function showQuestion() {
    answered = false;
    const q = questions[currentQ];
    const container = document.getElementById('quizContainer');

    document.getElementById('progressBar').style.width = ((currentQ) / questions.length * 100) + '%';
    document.getElementById('progressText').textContent = `ප්‍රශ්නය ${currentQ + 1} / ${questions.length}`;

    container.innerHTML = `
        <div class="question-card" style="animation: fadeInUp 0.5s ease-out">
            <span class="q-number">ප්‍රශ්නය ${currentQ + 1}</span>
            <div class="q-text">${q.q}</div>
            <div class="options">
                ${q.options.map((opt, i) => `
                    <div class="option" onclick="selectOption(${i})" data-index="${i}">
                        ${opt}
                    </div>
                `).join('')}
            </div>
            <button class="btn-next" id="btnNext" onclick="nextQuestion()">
                ${currentQ < questions.length - 1 ? 'ඊළඟ ප්‍රශ්නය ➜' : 'ප්‍රතිඵල බලන්න 🎯'}
            </button>
        </div>
    `;
}

function selectOption(index) {
    if (answered) return;
    answered = true;

    const q = questions[currentQ];
    const options = document.querySelectorAll('.option');
    const feedback = document.getElementById('feedback');

    options.forEach(opt => opt.classList.add('disabled'));

    if (index === q.correct) {
        score++;
        options[index].classList.add('correct');
        feedback.textContent = '✅ නිවැරදියි! හොඳට දන්නවා!';
        feedback.className = 'feedback correct show';
    } else {
        foolishScore++;
        options[index].classList.add('wrong');
        options[q.correct].classList.add('correct');
        feedback.textContent = '❌ වැරදියි! මෝඩ ලකුණු +1 🤪';
        feedback.className = 'feedback incorrect show';
    }

    // Show explanation
    if (q.explanation) {
        const explanationDiv = document.createElement('div');
        explanationDiv.style.cssText = 'margin-top:16px;padding:14px 18px;border-radius:12px;background:rgba(255,209,102,0.08);border:1px solid rgba(255,209,102,0.2);font-size:0.95rem;line-height:1.6;color:var(--accent2);animation:fadeInUp 0.4s ease-out;';
        explanationDiv.innerHTML = '💡 <strong>පැහැදිලි කිරීම:</strong> ' + q.explanation;
        document.querySelector('.question-card').appendChild(explanationDiv);
    }

    setTimeout(() => {
        feedback.classList.remove('show');
    }, 2500);

    document.getElementById('btnNext').style.display = 'block';
}

function nextQuestion() {
    currentQ++;
    if (currentQ >= questions.length) {
        showResults();
    } else {
        showQuestion();
    }
}

function showResults() {
    document.getElementById('quizContainer').innerHTML = '';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('progressText').style.display = 'none';

    const results = document.getElementById('results');
    results.style.display = 'block';

    const percentage = Math.round((foolishScore / questions.length) * 100);
    const timeTaken = Math.round((Date.now() - startTime) / 1000);

    let emoji, title, desc, meterColor;

    if (foolishScore <= 3) {
        emoji = '🧠';
        title = 'ඔයා හරිම බුද්ධිමත්!';
        desc = 'Trick questions වලට හසු වෙන්නේ නැහැ. ඔයාගේ මොළේ ගොඩක් sharp! ඔයාව රැවටීම ගොඩක් අමාරුයි. ඔයාගේ යාළුවන්ට challenge කරන්න! 👏🔥';
        meterColor = 'linear-gradient(90deg, var(--right), #4ade80)';
    } else if (foolishScore <= 6) {
        emoji = '🤔';
        title = 'නරක නැහැ, ඒත් හිතන්න ඕනේ!';
        desc = 'සමහර trick questions අල්ලගත්තා, ඒත් ගොඩක් ඒවාට හසු වුණා. ප්‍රශ්නේ හොඳට කියවලා හිතන්න පුරුදු වෙන්න! 💭';
        meterColor = 'linear-gradient(90deg, var(--accent2), #fbbf24)';
    } else if (foolishScore <= 10) {
        emoji = '😅';
        title = 'ආ... ටිකක් මෝඩයි නේද?';
        desc = 'ඔයා trick questions වලට ලේසියෙන්ම හසු වෙනවා! හැබැයි කමක් නැහැ, explanations කියවලා ඉගෙන ගන්න. ඊළඟ පාරට හොඳට කරමු! 😄';
        meterColor = 'linear-gradient(90deg, var(--accent), #fb923c)';
    } else {
        emoji = '🤪';
        title = 'සම්පූර්ණ මෝඩකමක්! 😂';
        desc = 'ඔයාව රැවටීම ලෝකෙම ලේසිම දේ! 🤣 ඒත් worry වෙන්න එපා - මේ trick questions, හැමෝටම වරදින ඒවා. නැවත try කරලා explanations කියවන්න!';
        meterColor = 'linear-gradient(90deg, var(--wrong), #f43f5e)';
    }

    document.getElementById('resultEmoji').textContent = emoji;
    document.getElementById('scoreDisplay').textContent = `${score}/${questions.length}`;
    document.getElementById('scoreLabel').textContent = `නිවැරදි පිළිතුරු ${score}ක් | මෝඩ ලකුණු ${foolishScore}ක්`;
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultDesc').textContent = desc;
    document.getElementById('statCorrect').textContent = score;
    document.getElementById('statWrong').textContent = foolishScore;
    document.getElementById('statTime').textContent = timeTaken + 's';

    const meterFill = document.getElementById('meterFill');
    meterFill.style.background = meterColor;

    setTimeout(() => {
        meterFill.style.width = percentage + '%';
    }, 300);

    // Confetti for good scores
    if (foolishScore <= 3) {
        launchConfetti();
    }
}

function launchConfetti() {
    const colors = ['#ff6b35', '#ffd166', '#06d6a0', '#ef476f', '#118ab2', '#fff'];
    for (let i = 0; i < 60; i++) {
        setTimeout(() => {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti-piece');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.width = (Math.random() * 8 + 5) + 'px';
            confetti.style.height = (Math.random() * 8 + 5) + 'px';
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(confetti);

            const duration = Math.random() * 2000 + 2000;
            const xDrift = (Math.random() - 0.5) * 200;

            confetti.animate([
                { transform: `translateY(0) translateX(0) rotate(0deg)`, opacity: 1 },
                { transform: `translateY(100vh) translateX(${xDrift}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
            }).onfinish = () => confetti.remove();
        }, i * 40);
    }
}

function shareResult() {
    const text = `🧠 මෝඩ පරීක්ෂණය - Trick Questions!\n\nමම ${score}/${questions.length} නිවැරදි පිළිතුරු දුන්නා!\nමෝඩ ලකුණු: ${foolishScore}\n\nඔයාට මේවට උත්තර දෙන්න පුළුවන්ද? Try කරන්න! 🤪🔥`;
    
    if (navigator.share) {
        navigator.share({
            title: 'මෝඩ පරීක්ෂණය 🤪',
            text: text
        }).catch(() => {
            copyToClipboard(text);
        });
    } else {
        copyToClipboard(text);
    }
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        const feedback = document.getElementById('feedback');
        feedback.textContent = '📋 Copy කරලා! Share කරන්න!';
        feedback.className = 'feedback correct show';
        setTimeout(() => feedback.classList.remove('show'), 2000);
    }).catch(() => {
        alert(text);
    });
}
</script>
